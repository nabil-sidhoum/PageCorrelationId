name: Build & Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/PageCorrelationId.sln

      - name: Build
        run: dotnet build src/PageCorrelationId.sln --no-restore --configuration Release

      - name: Tests
        run: dotnet test src/PageCorrelationId.sln --no-build --configuration Release --verbosity normal
